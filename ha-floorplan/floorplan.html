<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Floor Plan Editor</title>
<style>
  :root{
    --bg:#fff; --card:#fff; --ink:#212121; --muted:#727272; --faint:#9e9e9e;
    --line:#e4e6ea; --accent:#03a9f4; --accent-soft:#e1f5fe;
    --live:#0d9b3f; --danger:#e53935;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:13px;line-height:1.4}
  .app{height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
  .content{flex:1 1 auto;min-height:0;display:flex}
  .rail{flex:0 0 200px;display:flex;flex-direction:column;gap:8px;padding:10px;background:var(--card);border-right:1px solid var(--line);overflow:auto}
  .conn{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;border-radius:8px;padding:6px 8px}
  .conn.ok{background:#e8f5e9;color:#0f7a4d} .conn.bad{background:#fdecec;color:#c0392b}
  .conn .dot{width:7px;height:7px;border-radius:99px;background:currentColor}
  .rbtn{font-family:inherit;font-size:13px;font-weight:700;padding:9px;border-radius:9px;border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;text-align:left;display:flex;align-items:center;gap:7px}
  .rbtn.accent{background:var(--accent);color:#fff;border-color:var(--accent)}
  .rbtn:disabled{opacity:.5}
  .hint{font-size:11px;color:var(--muted);background:var(--accent-soft);border-radius:8px;padding:7px 9px}
  .rlist{display:flex;flex-direction:column;gap:6px;margin-top:2px}
  .rlbl{font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.03em;margin-top:4px}
  .rrow{border:1px solid var(--line);border-radius:9px;padding:7px;display:flex;flex-direction:column;gap:5px}
  .rrow .top{display:flex;align-items:center;gap:6px}
  .rrow .nm{flex:1;font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rrow .del{border:none;background:none;color:var(--danger);font-size:15px;cursor:pointer;padding:0 2px}
  select{width:100%;font-family:inherit;font-size:12px;padding:6px;border-radius:7px;border:1px solid var(--line);background:#fff}
  .canvas{flex:1 1 auto;min-width:0;min-height:0;display:flex;padding:8px;overflow:hidden;background:#fafafa}
  .canvas svg{width:100%;height:100%;display:block;background:#f0f2f5;border:1px solid var(--line);border-radius:10px;touch-action:none}
  .empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:13px;text-align:center;padding:20px;pointer-events:none}
  .bar{flex:0 0 auto;display:flex;gap:8px;padding:8px 10px;background:var(--card);border-top:1px solid var(--line)}
  .btn{flex:1;font-family:inherit;font-size:14px;font-weight:800;padding:11px;border-radius:10px;border:none;cursor:pointer}
  .btn.primary{background:var(--accent);color:#fff} .btn.primary:disabled{background:#a9d8f5;color:#fff}
  .btn.live{background:var(--live);color:#fff} .btn.live:disabled{background:#a9d8c0;color:#fff}
  .btn.ghost{flex:0 0 auto;background:#eef1f5;color:var(--ink);padding:11px 16px}
  /* saved view */
  #doneView{flex:1 1 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:16px;background:var(--card)}
  #doneView .t{font-size:15px;font-weight:800;color:var(--muted)}
  #doneView .btns{display:flex;gap:10px}
  #doneView .btn{flex:0 0 auto;padding:12px 26px}
  /* sheet */
  .sheet-bg{position:fixed;inset:0;background:rgba(20,30,45,.45);opacity:0;pointer-events:none;transition:.2s;z-index:40}
  .sheet-bg.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:18px 18px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));transform:translateY(110%);transition:transform .25s;z-index:41;max-width:560px;margin:0 auto}
  .sheet.show{transform:translateY(0)}
  .sheet h3{margin:0 0 10px;font-size:16px;font-weight:800}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{font-size:14px;font-weight:600;padding:10px 13px;border-radius:10px;border:2px solid var(--line);background:#fff;cursor:pointer}
  .toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:9px 15px;border-radius:9px;opacity:0;transition:.2s;z-index:50}
  .toast.show{opacity:1}
  .hidden{display:none!important}
</style>
</head>
<body>
<div class="app">
  <div class="content">
    <aside class="rail">
      <div class="conn bad" id="conn"><span class="dot"></span><span id="connTxt">Connecting…</span></div>
      <button class="rbtn" id="btnPhoto">📷 Take / upload photo</button>
      <button class="rbtn accent" id="btnAdd">➕ Add room</button>
      <div id="traceBox" class="hidden">
        <div class="hint">Tap each corner of the room on the photo, then Finish.</div>
        <div style="display:flex;gap:6px;margin-top:6px">
          <button class="rbtn accent" id="btnFinish" style="flex:1;justify-content:center">✓ Finish</button>
          <button class="rbtn" id="btnCancel" style="flex:1;justify-content:center">✕ Cancel</button>
        </div>
      </div>
      <div class="rlbl">Rooms</div>
      <div class="rlist" id="rlist"></div>
    </aside>
    <div class="canvas" style="position:relative">
      <svg id="svg" viewBox="0 0 1000 680" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="empty" id="emptyMsg">Add a photo of your floor plan, then “Add room”.</div>
    </div>
  </div>

  <div id="doneView" class="hidden">
    <div class="t">✅ Floor plan saved</div>
    <div class="btns">
      <button class="btn primary" id="dEdit">Edit</button>
      <button class="btn ghost" id="dReset">Reset</button>
    </div>
  </div>

  <div class="bar" id="bar">
    <button class="btn ghost" id="btnResetAll">Reset</button>
    <button class="btn live" id="btnSave">Save</button>
  </div>
</div>

<input type="file" accept="image/*" capture="environment" id="photoInput" hidden>
<div class="sheet-bg" id="sheetBg"></div>
<div class="sheet" id="sheet">
  <h3>Room name</h3>
  <div class="chips" id="chips"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const params=new URLSearchParams(location.search);
const CONFIG={ API_BASE:params.get('api')||"", API_KEY:params.get('key')||"YOUR_API_KEY" };
const SVGNS="http://www.w3.org/2000/svg";
const PRESETS=["Living Room","Kitchen","Master Bedroom","Bedroom","Small Room","Bathroom","Entrance","Study","Dressing Room","Utility Room"];
const COLORS=["#03a9f4","#7c5cff","#ff9800","#0d9b3f","#e91e63","#00bcd4","#ffb300","#8e44ad"];
const $=id=>document.getElementById(id);
function toast(m){const t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove("show"),1800);}
function esc(s){return(s+"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

const state={image:null,imgW:1000,imgH:680,rooms:[],devices:[],tracing:false,draft:[],saved:false};

/* ---- backend ---- */
async function apiGet(p){const r=await fetch(CONFIG.API_BASE+p,{headers:{"X-API-Key":CONFIG.API_KEY}});if(r.status===404)return null;if(!r.ok)throw new Error(r.status);return r.json();}
async function apiPost(p,b){const r=await fetch(CONFIG.API_BASE+p,{method:"POST",headers:{"X-API-Key":CONFIG.API_KEY,"Content-Type":"application/json"},body:JSON.stringify(b)});if(!r.ok)throw new Error(r.status);return r.json();}
function setConn(ok,m){$("conn").className="conn "+(ok?"ok":"bad");$("connTxt").textContent=m;}
async function fetchDevices(){try{state.devices=await apiGet("/api/v1/devices")||[];setConn(true,`Connected · ${state.devices.length}`);}catch(e){state.devices=[];setConn(false,"No backend");}}

/* ---- photo ---- */
$("btnPhoto").onclick=()=>$("photoInput").click();
$("photoInput").onchange=e=>{const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();rd.onload=()=>{const im=new Image();im.onload=()=>{
    let w=im.width,h=im.height,mx=1000;if(w>mx){h=Math.round(h*mx/w);w=mx;}
    const cv=document.createElement("canvas");cv.width=w;cv.height=h;cv.getContext("2d").drawImage(im,0,0,w,h);
    state.image=cv.toDataURL("image/jpeg",0.72);state.imgW=w;state.imgH=h;render();toast("Photo added");
  };im.src=rd.result;};rd.readAsDataURL(f);};

/* ---- coords ---- */
function ptUser(e){const svg=$("svg");const p=svg.createSVGPoint();p.x=e.clientX;p.y=e.clientY;const m=svg.getScreenCTM();if(!m)return null;const u=p.matrixTransform(m.inverse());return [Math.round(u.x),Math.round(u.y)];}
$("svg").addEventListener("click",e=>{if(!state.tracing)return;const pt=ptUser(e);if(!pt)return;state.draft.push(pt);render();});

/* ---- trace ---- */
$("btnAdd").onclick=()=>{state.tracing=true;state.draft=[];$("traceBox").classList.remove("hidden");$("btnAdd").classList.add("hidden");render();};
$("btnCancel").onclick=()=>{state.tracing=false;state.draft=[];$("traceBox").classList.add("hidden");$("btnAdd").classList.remove("hidden");render();};
$("btnFinish").onclick=()=>{if(state.draft.length<3){toast("Tap at least 3 corners");return;}openSheet(state.draft.slice());state.draft=[];state.tracing=false;$("traceBox").classList.add("hidden");$("btnAdd").classList.remove("hidden");};

function openSheet(poly){const chips=$("chips");chips.innerHTML="";
  PRESETS.forEach(n=>{const used=state.rooms.some(r=>r.name===n);const c=document.createElement("button");c.className="chip";c.textContent=n;if(used){c.style.opacity=".4";}
    c.onclick=()=>{addRoom(n,poly);closeSheet();};chips.appendChild(c);});
  const cu=document.createElement("button");cu.className="chip";cu.textContent="+ Custom";
  cu.onclick=()=>{const v=prompt("Room name");if(v){addRoom(v,poly);closeSheet();}};chips.appendChild(cu);
  $("sheet").classList.add("show");$("sheetBg").classList.add("show");}
function closeSheet(){$("sheet").classList.remove("show");$("sheetBg").classList.remove("show");}
$("sheetBg").onclick=closeSheet;
function addRoom(name,poly){state.rooms.push({name,device_key:null,polygon:poly});render();}

/* ---- render ---- */
function render(){
  const svg=$("svg");svg.setAttribute("viewBox",`0 0 ${state.imgW} ${state.imgH}`);svg.innerHTML="";
  $("emptyMsg").classList.toggle("hidden", !!state.image || state.rooms.length>0);
  if(state.image){const im=document.createElementNS(SVGNS,"image");im.setAttributeNS("http://www.w3.org/1999/xlink","href",state.image);
    im.setAttribute("x",0);im.setAttribute("y",0);im.setAttribute("width",state.imgW);im.setAttribute("height",state.imgH);svg.appendChild(im);}
  state.rooms.forEach((rm,i)=>{const c=COLORS[i%COLORS.length];const g=document.createElementNS(SVGNS,"g");
    const path=document.createElementNS(SVGNS,"path");let d="";rm.polygon.forEach((p,k)=>d+=(k?"L":"M")+p[0]+" "+p[1]+" ");d+="Z";
    path.setAttribute("d",d);path.setAttribute("fill",c);path.setAttribute("fill-opacity",".25");path.setAttribute("stroke",c);path.setAttribute("stroke-width",3);path.setAttribute("stroke-linejoin","round");g.appendChild(path);
    const cx=rm.polygon.reduce((a,p)=>a+p[0],0)/rm.polygon.length, cy=rm.polygon.reduce((a,p)=>a+p[1],0)/rm.polygon.length;
    const t=document.createElementNS(SVGNS,"text");t.setAttribute("x",cx);t.setAttribute("y",cy);t.setAttribute("text-anchor","middle");t.setAttribute("dominant-baseline","central");t.setAttribute("font-family","sans-serif");t.setAttribute("font-weight","800");t.setAttribute("font-size","20");t.setAttribute("fill",c);t.textContent=rm.name;g.appendChild(t);
    svg.appendChild(g);});
  // draft
  if(state.tracing&&state.draft.length){const c="#e53935";
    if(state.draft.length>=2){const pl=document.createElementNS(SVGNS,"polyline");pl.setAttribute("points",state.draft.map(p=>p.join(",")).join(" "));pl.setAttribute("fill","none");pl.setAttribute("stroke",c);pl.setAttribute("stroke-width",3);svg.appendChild(pl);}
    state.draft.forEach(p=>{const dot=document.createElementNS(SVGNS,"circle");dot.setAttribute("cx",p[0]);dot.setAttribute("cy",p[1]);dot.setAttribute("r",6);dot.setAttribute("fill",c);svg.appendChild(dot);});}
  renderList();
}
function renderList(){const wrap=$("rlist");wrap.innerHTML="";
  if(!state.rooms.length){wrap.innerHTML='<div class="hint">No rooms yet.</div>';return;}
  state.rooms.forEach((rm,i)=>{const c=COLORS[i%COLORS.length];const row=document.createElement("div");row.className="rrow";
    const top=document.createElement("div");top.className="top";
    top.innerHTML=`<span style="width:10px;height:10px;border-radius:99px;background:${c};flex:0 0 auto"></span><span class="nm">${esc(rm.name)}</span>`;
    const del=document.createElement("button");del.className="del";del.textContent="✕";del.onclick=()=>{state.rooms.splice(i,1);render();};top.appendChild(del);
    const sel=document.createElement("select");sel.innerHTML='<option value="">— No sensor —</option>'+state.devices.map(d=>`<option value="${esc(d.device_key)}" ${rm.device_key===d.device_key?"selected":""}>${esc(d.name||d.device_key)}${d.location?" ("+esc(d.location)+")":""}</option>`).join("");
    sel.onchange=e=>{rm.device_key=e.target.value||null;};
    row.appendChild(top);row.appendChild(sel);wrap.appendChild(row);});
}

/* ---- save / load / modes ---- */
async function save(){
  if(!state.rooms.length){toast("Add at least one room");return;}
  const btn=$("btnSave");btn.disabled=true;btn.textContent="Saving…";
  try{await apiPost("/api/v1/floorplans",{name:"My Home",data:{source:"photo",image:state.image,imageW:state.imgW,imageH:state.imgH,rooms:state.rooms}});
    state.saved=true;toast("Saved ✅");showSaved(true);
  }catch(e){toast("Save failed: "+e.message);}
  finally{btn.disabled=false;btn.textContent="Save";}
}
function showSaved(on){
  document.querySelector(".content").classList.toggle("hidden",on);
  $("doneView").classList.toggle("hidden",!on);
  $("bar").style.display=on?"none":"flex";
}
$("btnSave").onclick=save;
$("btnResetAll").onclick=()=>{if(confirm("Clear everything?")){state.image=null;state.rooms=[];state.imgW=1000;state.imgH=680;render();}};
$("dEdit").onclick=()=>showSaved(false);
$("dReset").onclick=()=>{state.image=null;state.rooms=[];state.imgW=1000;state.imgH=680;showSaved(false);render();};

async function load(){
  const fp=await apiGet("/api/v1/floorplans/latest").catch(()=>null);
  if(fp&&fp.data&&Array.isArray(fp.data.rooms)&&fp.data.rooms.length){
    const d=fp.data;state.rooms=d.rooms.map(r=>({name:r.name,device_key:r.device_key||null,polygon:r.polygon}));
    if(d.image){state.image=d.image;state.imgW=d.imageW||1000;state.imgH=d.imageH||680;}
    state.saved=true;render();showSaved(true);return;
  }
  render();showSaved(false);
}
(async()=>{await fetchDevices();await load();})();
</script>
</body>
</html>

# Alembic 설정. 실제 DB URL 은 alembic/env.py 에서 app 설정(settings.database_url)으로 주입한다.
[alembic]
script_location = alembic
prepend_sys_path = .
# (sqlalchemy.url 은 env.py 에서 동적으로 설정하므로 여기서는 비워둠)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
